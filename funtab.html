<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="go-to-page.js"></script>
    <script src="header.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fun Tab — Hackathon Log</title>
    <style>
      body {
        background: #f5f0e8;
      }
      .polaroid {
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 6px 32px rgba(0, 0, 0, 0.13);
        padding: 0.7rem 0.7rem 1.5rem 0.7rem;
        margin-bottom: 2.5rem;
        width: 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1.5px solid #e7e2d7;
      }
      .polaroid-img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        background: #f5f0e8;
      }
      .polaroid-label {
        margin-top: 1.1rem;
        font-size: 1.08rem;
        font-family: "Georgia", serif;
        color: #7c6f5e;
        font-weight: 600;
        text-align: center;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body class="bg-[#f5f0e8] min-h-screen">
    <site-header></site-header>
    <div class="max-w-2xl mx-auto px-5 pt-10 pb-16">
      <h1
        class="text-3xl font-bold text-center text-gray-900 mb-2"
        style="font-family: &quot;Georgia&quot;, serif"
      >
        Fun Tab
      </h1>
      <div class="flex justify-center mb-8">
        <span class="w-10 h-px bg-gray-400 block"></span>
      </div>
      <!-- Mini counter -->
      <div class="bg-white rounded-xl p-6 mb-8 shadow-sm border border-gray-200 flex flex-col items-center gap-4">
        <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Counter</span>
        <span id="mini-count" class="text-6xl font-bold text-gray-900" style="font-family:'Georgia',serif;letter-spacing:-3px;line-height:1;transition:color 0.2s,transform 0.1s">0</span>
        <div class="flex gap-3">
          <button id="mini-dec" class="w-12 h-12 rounded-xl border border-gray-200 text-gray-500 text-xl font-bold bg-white hover:bg-red-50 hover:border-red-200 hover:text-red-600 transition-colors active:scale-95 select-none">−</button>
          <button id="mini-reset" class="px-4 h-12 rounded-xl border border-gray-200 text-xs font-semibold text-gray-400 bg-white hover:bg-gray-100 transition-colors active:scale-95 select-none">Reset</button>
          <button id="mini-inc" class="w-12 h-12 rounded-xl border border-gray-200 text-gray-500 text-xl font-bold bg-white hover:bg-green-50 hover:border-green-200 hover:text-green-700 transition-colors active:scale-95 select-none">+</button>
        </div>
        <a href="counter.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors" style="font-family:sans-serif">Open full counter →</a>
      </div>

      <div class="flex flex-row gap-8 items-start">
        <go-to-page-button
          link="index.html"
          label="Let's go home I'm tired"
          photo="public/pic/home.jpg"
          radius="18px"
          background="#fff"
          color="#7c6f5e"
          width="180px"
          height="240px"
          fontsize="1.08rem"
        ></go-to-page-button>
        <go-to-page-button
          link="aboutme.html"
          label="Go to about me"
          photo="public/pic/aboutme.jpg"
          radius="18px"
          background="#fff"
          color="#7c6f5e"
          width="180px"
          height="240px"
          fontsize="1.08rem"
        ></go-to-page-button>
      </div>
    </div>
    <script>
      let miniCount = 0;
      const miniDisplay = document.getElementById('mini-count');
      function miniUpdate() {
        miniDisplay.textContent = miniCount;
        miniDisplay.style.color = miniCount > 0 ? '#15803d' : miniCount < 0 ? '#b91c1c' : '#111827';
        miniDisplay.style.transform = 'scale(1.08)';
        setTimeout(() => miniDisplay.style.transform = '', 130);
      }
      document.getElementById('mini-inc').addEventListener('click', () => { miniCount++; miniUpdate(); });
      document.getElementById('mini-dec').addEventListener('click', () => { miniCount--; miniUpdate(); });
      document.getElementById('mini-reset').addEventListener('click', () => { miniCount = 0; miniUpdate(); });
    </script>
  </body>
</html>
